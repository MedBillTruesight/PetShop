name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore PetShop.slnx

    - name: Build solution
      run: dotnet build PetShop.slnx --configuration Release --no-restore

    - name: Run tests with coverage
      run: dotnet test PetShop.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./test-results

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: reportgenerator -reports:"./test-results/*/coverage.cobertura.xml" -targetdir:"./coverage-report" -reporttypes:"Html;TextSummary;Badges"

    - name: Display coverage summary
      run: cat ./coverage-report/Summary.txt

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage-report/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./test-results/
        retention-days: 30

    - name: Install bc for calculations
      run: sudo apt-get update && sudo apt-get install -y bc

    - name: Check coverage thresholds
      run: |
        # Extract line coverage percentage from summary
        COVERAGE=$(grep "Line coverage" ./coverage-report/Summary.txt | grep -o "[0-9]\+\.[0-9]\+" | head -1)

        echo "Overall line coverage: $COVERAGE%"

        # Check if coverage meets minimum requirements
        # Domain: 100%, Application: 90%, API: 80%, Overall: 85%
        DOMAIN_COVERAGE=$(grep -A 20 "PetShop.Domain" ./coverage-report/Summary.txt | grep "Line coverage" | grep -o "[0-9]\+\.[0-9]\+" | head -1 || echo "0")
        APPLICATION_COVERAGE=$(grep -A 20 "PetShop.Application" ./coverage-report/Summary.txt | grep "Line coverage" | grep -o "[0-9]\+\.[0-9]\+" | head -1 || echo "0")
        API_COVERAGE=$(grep -A 20 "PetShop.Api" ./coverage-report/Summary.txt | grep "Line coverage" | grep -o "[0-9]\+\.[0-9]\+" | head -1 || echo "0")

        echo "Domain coverage: $DOMAIN_COVERAGE%"
        echo "Application coverage: $APPLICATION_COVERAGE%"
        echo "API coverage: $API_COVERAGE%"

        # Validate coverage thresholds
        if (( $(echo "$DOMAIN_COVERAGE < 100" | bc -l) )); then
          echo "❌ Domain layer coverage ($DOMAIN_COVERAGE%) is below 100% threshold"
          exit 1
        fi

        if (( $(echo "$APPLICATION_COVERAGE < 90" | bc -l) )); then
          echo "❌ Application layer coverage ($APPLICATION_COVERAGE%) is below 90% threshold"
          exit 1
        fi

        if (( $(echo "$API_COVERAGE < 80" | bc -l) )); then
          echo "❌ API layer coverage ($API_COVERAGE%) is below 80% threshold"
          exit 1
        fi

        if (( $(echo "$COVERAGE < 85" | bc -l) )); then
          echo "❌ Overall coverage ($COVERAGE%) is below 85% threshold"
          exit 1
        fi

        echo "✅ All coverage thresholds met!"

  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore PetShop.slnx

    - name: Build solution
      run: dotnet build PetShop.slnx --configuration Release --no-restore

    - name: Run tests with coverage for SonarCloud
      run: dotnet test PetShop.slnx --configuration Release --no-build --verbosity minimal --collect:"XPlat Code Coverage" --results-directory ./test-results

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=felixmarvindev_PetShop # Replace with your actual SonarCloud project key
          -Dsonar.organization=felixmarvindev        # Replace with your actual SonarCloud organization key
          -Dsonar.cs.opencover.reportsPaths=test-results/*/coverage.opencover.xml
          -Dsonar.coverage.exclusions=**/Test*.cs,**/Program.cs,**/*TestController.cs,**/*ErrorTestController.cs